<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
<title id="title">Technology stack as a systems map</title><desc id="desc">Languages, application frameworks, data stores, and delivery tooling.</desc>
<defs>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#1E293B" stroke-width="1" opacity=".32"/></pattern>
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#1E293B" opacity=".75"/></pattern>
  <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#69A9FF"/><stop offset=".34" stop-color="#A78BFA"/><stop offset=".68" stop-color="#FF4FD8"/><stop offset="1" stop-color="#FFB454"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#62F5C5"/><stop offset="1" stop-color="#69A9FF"/></linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
</defs>
<rect width="1180" height="420" rx="26" fill="#070A0F"/><rect x="1" y="1" width="1178" height="418" rx="25" fill="none" stroke="#2B354A"/><rect width="1180" height="420" rx="26" fill="url(#dots)"/>
<text x="40" y="50" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" letter-spacing="2" fill="#69A9FF">OPERATING LAYERS / SYSTEMS MAP</text>
<text x="40" y="96" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="900" fill="#F8FAFC">FROM SOURCE CODE TO PRODUCTION.</text>
<text x="40" y="123" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#94A3B8">A stack organized by responsibility, not by logo collection.</text>
