<svg xmlns="http://www.w3.org/2000/svg" width="570" height="290" viewBox="0 0 570 290" role="img" aria-labelledby="title desc">
<title id="title">Klidná Praha</title><desc id="desc">urban well-being. A route planner that optimizes for calm, not just speed, using noise, air quality, terrain, and transit data.</desc>
<defs>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#1E293B" stroke-width="1" opacity=".32"/></pattern>
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#1E293B" opacity=".75"/></pattern>
  <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#69A9FF"/><stop offset=".34" stop-color="#A78BFA"/><stop offset=".68" stop-color="#FF4FD8"/><stop offset="1" stop-color="#FFB454"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#62F5C5"/><stop offset="1" stop-color="#69A9FF"/></linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
</defs>
<rect width="570" height="290" rx="24" fill="#070A0F"/><rect x="1" y="1" width="568" height="288" rx="23" fill="none" stroke="#2A3549"/>
<rect x="0" y="0" width="10" height="290" rx="5" fill="#62F5C5"/><rect width="570" height="290" rx="24" fill="url(#dots)"/>
<text x="34" y="42" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" font-weight="700" letter-spacing="1.6" fill="#62F5C5">URBAN WELL-BEING</text>
<text x="34" y="91" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="36" font-weight="900" letter-spacing="-1.2" fill="#F8FAFC">Klidná Praha</text>
<text x="34" y="128" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#94A3B8">A route planner that optimizes for calm, not just speed,</text>
