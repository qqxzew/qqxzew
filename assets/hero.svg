<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" role="img" aria-labelledby="title desc">
<title id="title">Andrii Fedorov — backend developer and AI product builder</title><desc id="desc">Custom profile banner with project and competition highlights.</desc>
<defs>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#1E293B" stroke-width="1" opacity=".32"/></pattern>
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#1E293B" opacity=".75"/></pattern>
  <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#69A9FF"/><stop offset=".34" stop-color="#A78BFA"/><stop offset=".68" stop-color="#FF4FD8"/><stop offset="1" stop-color="#FFB454"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#62F5C5"/><stop offset="1" stop-color="#69A9FF"/></linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
</defs>
<rect width="1180" height="430" rx="28" fill="#070A0F"/>
<rect x="1" y="1" width="1178" height="428" rx="27" fill="none" stroke="#243047"/>
<rect width="1180" height="430" rx="28" fill="url(#grid)"/>
<rect x="0" y="0" width="14" height="430" rx="7" fill="url(#spectrum)"/>
<circle cx="1020" cy="70" r="145" fill="#69A9FF" opacity=".07"/><circle cx="1080" cy="175" r="105" fill="#FF4FD8" opacity=".06"/>

<!-- top labels -->
<rect x="50" y="36" width="122" height="30" rx="15" fill="#62F5C5"/><text x="111" y="56" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="800" fill="#04110C">PLZEŇ / CZ</text>
<rect x="184" y="36" width="202" height="30" rx="15" fill="none" stroke="#F6FF5C"/><circle cx="202" cy="51" r="4" fill="#F6FF5C" filter="url(#glow)"/><text x="287" y="56" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#F6FF5C">BUILDING IN PUBLIC</text>
<text x="50" y="97" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" letter-spacing="2.5" fill="#94A3B8">BACKEND / APPLIED AI / OPEN DATA / INFRA</text>

<!-- name -->
<text x="46" y="187" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="78" font-weight="900" letter-spacing="-4" fill="#F8FAFC">ANDRII</text>
<text x="46" y="258" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="78" font-weight="900" letter-spacing="-4" fill="none" stroke="#69A9FF" stroke-width="2">FEDOROV</text>
<text x="50" y="298" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">I turn messy problems into shipped systems.</text>
<text x="50" y="326" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#94A3B8">Backend engineer · AI product builder · hackathon competitor</text>

