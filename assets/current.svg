  <circle cx="0" cy="115" r="12" fill="#62F5C5"/><circle cx="125" cy="75" r="12" fill="#69A9FF"/><circle cx="260" cy="120" r="12" fill="#A78BFA"/><circle cx="350" cy="120" r="12" fill="#FF4FD8"/>
