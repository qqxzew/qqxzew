<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="255" viewBox="0 0 1180 255" role="img" aria-labelledby="title desc">
<title id="title">Current mission — Střední AI</title><desc id="desc">Co-founder and only developer building an AI career assistant for students.</desc>
<defs>
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#1E293B" stroke-width="1" opacity=".32"/></pattern>
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#1E293B" opacity=".75"/></pattern>
  <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#69A9FF"/><stop offset=".34" stop-color="#A78BFA"/><stop offset=".68" stop-color="#FF4FD8"/><stop offset="1" stop-color="#FFB454"/></linearGradient>
  <linearGradient id="cool" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#62F5C5"/><stop offset="1" stop-color="#69A9FF"/></linearGradient>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
</defs>
<rect width="1180" height="255" rx="24" fill="#070A0F"/><rect x="1" y="1" width="1178" height="253" rx="23" fill="none" stroke="#2B354A"/>
<rect x="0" y="0" width="1180" height="8" rx="4" fill="url(#spectrum)"/><rect width="1180" height="255" rx="24" fill="url(#dots)"/>
<text x="42" y="55" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" letter-spacing="2" fill="#F6FF5C">CURRENT MISSION / 2025—NOW</text>
<text x="42" y="116" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="50" font-weight="900" letter-spacing="-2" fill="#F8FAFC">STŘEDNÍ AI</text>
<text x="42" y="149" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#62F5C5">CO-FOUNDER · ONLY DEVELOPER</text>
<text x="42" y="181" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#94A3B8">An AI career assistant helping students choose secondary schools and career directions.</text>
<text x="42" y="208" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" fill="#F8FAFC">TOP 3 at Startupuj · product built end-to-end · preparing deployment with SIT Port</text>

